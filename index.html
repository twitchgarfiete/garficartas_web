<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garficartas | Premium 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-gradient: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            --secondary: #4ecdc4;
            --secondary-gradient: linear-gradient(135deg, #4ecdc4 0%, #556ee6 100%);
            --dark-bg: #0a0a0c;
            --card-bg: #16161a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1a1a2e, var(--dark-bg));
            color: var(--text-main);
            padding-bottom: 100px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(15px);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        header h2 {
            margin: 0;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }

        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GRID DE CARTAS --- */
        .grid-cartas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 15px;
        }

        .carta-box {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 6px;
            transition: transform 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .carta-box:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .carta-box img {
            width: 100%;
            border-radius: 10px;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .badge-count-float {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary-gradient);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
            z-index: 2;
        }

        .carta-name {
            font-size: 0.7rem;
            margin-top: 5px;
            color: var(--text-muted);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- ACORDEONES --- */
        .accordion-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            margin-bottom: 12px;
            border-radius: 15px;
            overflow: hidden;
        }

        .acc-button {
            width: 100%;
            background: none;
            color: white;
            padding: 18px;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            font-weight: 600;
        }

        .acc-content {
            padding: 0 18px 18px 18px;
            display: none;
            border-top: 1px solid var(--glass-border);
        }

        .show { display: block; }

        /* --- MODAL CON EFECTO 3D AVANZADO --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            perspective: 1500px; /* Profundidad 3D */
            touch-action: none;
        }

        .modal-content {
            width: 85%;
            max-width: 320px;
            position: relative;
            pointer-events: none; /* Permite que el ratón pase al contenedor de abajo */
        }

        .card-3d-container {
            width: 100%;
            aspect-ratio: 2/3;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Suaviza el seguimiento del ratón */
            pointer-events: auto;
        }

        .card-3d-container img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            object-fit: cover;
            backface-visibility: hidden;
        }

        /* Brillo dinámico sobre la carta */
        .card-glare {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 20px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 80%);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.3s;
        }

        /* --- NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 70px;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            display: flex;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            border: none;
            background: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-btn.active { color: var(--primary); }
        .nav-btn span { font-size: 1.4rem; margin-bottom: 2px; }

        .info-card {
            background: var(--glass);
            padding: 40px 20px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h2>Garficartas</h2>
</header>

<div class="container">
    <section id="sec-cartas" class="section active-section">
        <h3 style="color: var(--primary)">📦 Drops Disponibles</h3>
        <div id="lista-drops"></div>
    </section>

    <section id="sec-colecciones" class="section">
        <h3 style="color: var(--secondary)">🏆 Colecciones</h3>
        <div id="lista-usuarios"></div>
    </section>

    <section id="sec-info" class="section">
        <h3>✨ Redes Sociales</h3>
        <div class="info-card">
            <h1>@gaarfiete</h1>
            <a href="https://www.twitch.tv/gaarfiete" target="_blank" style="color:var(--primary); text-decoration: none; font-weight: bold; margin: 0 10px;">TWITCH</a>
            <a href="https://www.instagram.com/gaarfiete/" target="_blank" style="color:var(--primary); text-decoration: none; font-weight: bold; margin: 0 10px;">INSTAGRAM</a>
        </div>
    </section>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="changeTab('sec-cartas', this)"><span>🃏</span>DROPS</button>
    <button class="nav-btn" onclick="changeTab('sec-colecciones', this)"><span>👥</span>COLECCIONES</button>
    <button class="nav-btn" onclick="changeTab('sec-info', this)"><span>ℹ️</span>INFO</button>
</nav>

<div id="card-modal" class="modal" onclick="closeModal()">
    <div class="modal-content">
        <div class="card-3d-container" id="card-container">
            <img id="modal-img" src="" alt="Garficarta">
            <div class="card-glare" id="card-glare"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBX9Pp_s7rmYjFwIFFz1hs41mKhgf3Q3JQ",
        authDomain: "garficartas.firebaseapp.com",
        databaseURL: "https://garficartas-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "garficartas",
        storageBucket: "garficartas.firebasestorage.app",
        appId: "1:151850646545:web:a802ce7c4a3137014905b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const baseURL = "https://raw.githubusercontent.com/twitchgarfiete/cartas/refs/heads/main/cartas_twitch/";

    const DROPS = {
        "Drop 1": ["maya","cr_gameplays","nnalentina","phoenix_peruano","las_escaleras_de_xavi","guinnito","garfialbannil","villapene","garfiopa","paula_enmascarada","el_mcgretrato","hamstergito","garfiete_tenebroso","viajes_sushi","markitozzz","garfiuwu","tortilla","andrea_la_tormentas","jorgito_agresivo","garfipino","garfichef","nat_acrobata","markibingo","escaleras_salteadas","filete","berenjena","la_bala_azul","ivan_mi_capitan","erika","markitos_fumon","natana","garfinoticias","don_jorge_mendoza","perolas","mono_bailarin","cooking_paula","estafait","muajaja","soyseila","anushka_3","mcreciclage","r_g_m","miriam_tiburona","markitos_skills","phoenix_garfiete","garfiete_platanero","jorgito_carnicero","garfiete_brujo","valentina","garfito"],
        "Edición Limitada": ["las_garficartas","garfiete","el_hormiguero"]
    };

    // NAVEGACIÓN
    window.changeTab = (sectionId, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active-section');
        btn.classList.add('active');
    };

    window.toggleAcc = (id) => {
        const el = document.getElementById(id);
        const isVisible = el.classList.contains('show');
        document.querySelectorAll('.acc-content').forEach(c => c.classList.remove('show'));
        if(!isVisible) el.classList.add('show');
    };

    // LÓGICA MODAL 3D MEJORADA
    const modal = document.getElementById('card-modal');
    const container = document.getElementById('card-container');
    const glare = document.getElementById('card-glare');

    window.openCard = (src) => {
        document.getElementById('modal-img').src = src;
        modal.style.display = 'flex';
        // Reset posición
        container.style.transform = `rotateX(0deg) rotateY(0deg)`;
        glare.style.opacity = '0';
    };

    window.closeModal = () => {
        modal.style.display = 'none';
    };

    // Efecto de movimiento
    modal.addEventListener('mousemove', (e) => {
        if (modal.style.display !== 'flex') return;

        const rect = modal.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        // Calculamos rotación (Máximo 30 grados)
        const rotateX = (centerY - y) / 10; 
        const rotateY = (x - centerX) / 10;

        container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        
        // Efecto de brillo (glare)
        glare.style.opacity = '1';
        glare.style.background = `radial-gradient(circle at ${x/rect.width*100}% ${y/rect.height*100}%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 80%)`;
    });

    // Soporte para móviles (Touch)
    modal.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const rect = modal.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        const rotateX = ((rect.height/2) - y) / 10;
        const rotateY = (x - (rect.width/2)) / 10;
        container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        glare.style.opacity = '1';
        glare.style.background = `radial-gradient(circle at ${x/rect.width*100}% ${y/rect.height*100}%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 80%)`;
    }, { passive: true });

    // RENDER DATABASE
    onValue(ref(db, 'usuarios'), (snapshot) => {
        const usuarios = snapshot.val();
        render(usuarios);
    });

    function render(usuarios) {
        const dropDiv = document.getElementById('lista-drops');
        const userDiv = document.getElementById('lista-usuarios');
        dropDiv.innerHTML = ""; userDiv.innerHTML = "";

        Object.keys(DROPS).forEach((name, i) => {
            const cardsHTML = DROPS[name].map(c => `
                <div class="carta-box" onclick="openCard('${baseURL}${c}.png')">
                    <img src="${baseURL}${c}.png" loading="lazy">
                    <div class="carta-name">${c.replace(/_/g,' ')}</div>
                </div>`).join('');
            dropDiv.innerHTML += `<div class="accordion-item"><button class="acc-button" onclick="toggleAcc('d-${i}')"><span>📦 ${name}</span></button><div id="d-${i}" class="acc-content"><div class="grid-cartas">${cardsHTML}</div></div></div>`;
        });

        const TODAS = Object.values(DROPS).flat();
        Object.keys(usuarios).forEach((user, i) => {
            const col = usuarios[user].coleccion || {};
            let total = 0;
            const cardsHTML = TODAS.map(c => {
                if(col[c] > 0) {
                    total++;
                    return `<div class="carta-box" onclick="openCard('${baseURL}${c}.png')"><span class="badge-count-float">x${col[c]}</span><img src="${baseURL}${c}.png"><div class="carta-name">${c.replace(/_/g,' ')}</div></div>`;
                } return '';
            }).join('');
            userDiv.innerHTML += `<div class="accordion-item"><button class="acc-button" onclick="toggleAcc('u-${i}')"><span>👤 ${user}</span><small>${total} cartas</small></button><div id="u-${i}" class="acc-content"><div class="grid-cartas">${cardsHTML || '<p>Sin cartas</p>'}</div></div></div>`;
        });
    }
</script>
</body>
</html>
